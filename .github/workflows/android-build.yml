name: Build Android AAB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Add Android platform
        run: npx cap add android || true

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Regenerate Gradle Wrapper
        run: |
          cd android
          # Ensure directory exists
          mkdir -p gradle/wrapper
          
          # Use curl to download the wrapper jar directly if 'gradle' command fails
          # This is the most reliable way to get the jar
          if ! command -v gradle &> /dev/null; then
            echo "Gradle command not found, downloading wrapper jar directly..."
            curl -L -f https://raw.githubusercontent.com/gradle/gradle/v8.13/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
            curl -L -f https://raw.githubusercontent.com/gradle/gradle/v8.13/gradle/wrapper/gradle-wrapper.properties -o gradle/wrapper/gradle-wrapper.properties
          else
            echo "Gradle command found, generating wrapper..."
            gradle wrapper --gradle-version 8.13
          fi
          
          # Verify file exists
          ls -l gradle/wrapper/gradle-wrapper.jar
          
          # Ensure execution permissions
          chmod +x gradlew

      - name: Build Android AAB (Unsigned)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease --stacktrace
        env:
          REVENUECAT_API_KEY: ${{ secrets.REVENUECAT_API_KEY }}

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-unsigned
          path: android/app/build/outputs/bundle/release/app-release.aab
